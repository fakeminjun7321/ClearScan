name: Bug report
description: Report a reproducible ClearScan defect
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Native camera
        - Native library/editor/export
        - Native Google Drive/Docs
        - Companion web
        - Local backend
        - Build or CI
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Commit, iOS/macOS version, device or simulator, and Xcode/Node version
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Use redacted or synthetic documents only.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Verification level and evidence
      description: Separate unit, simulator, physical-device, and live-integration results.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy
      options:
        - label: I removed personal information, credentials, and private documents.
          required: true
