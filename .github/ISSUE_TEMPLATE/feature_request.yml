name: Feature request
description: Propose a focused ClearScan improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What scanning workflow is difficult today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful behavior and its privacy impact.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: How should it be verified?
      description: Include measurable unit, simulator, device, or integration evidence.
