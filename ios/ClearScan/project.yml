name: ClearScan
options:
  bundleIdPrefix: org.clearscan
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
configFiles:
  Debug: Config/OpenSource.xcconfig
  Release: Config/OpenSource.xcconfig
packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 9.0.0
settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    TARGETED_DEVICE_FAMILY: "1,2"
    CODE_SIGN_STYLE: Automatic
    SUPPORTS_MACCATALYST: NO
    GENERATE_INFOPLIST_FILE: NO
targets:
  ClearScan:
    type: application
    platform: iOS
    sources:
      - path: App/UIKitApplication.swift
      - path: App/Assets.xcassets
      - path: UIKitUI
      - path: Core
      - path: Capture
        excludes:
          - DocumentCameraPreview.swift
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: ClearScan
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "6"
        GIDClientID: $(GOOGLE_IOS_CLIENT_ID)
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - $(GOOGLE_IOS_REVERSED_CLIENT_ID)
        UILaunchScreen: {}
        NSCameraUsageDescription: 문서를 촬영하고 자동으로 스캔하기 위해 카메라를 사용합니다.
        NSPhotoLibraryUsageDescription: 기존 사진을 문서 페이지로 가져오기 위해 사진 보관함을 사용합니다.
        NSPhotoLibraryAddUsageDescription: 내보낸 스캔 이미지를 사진 보관함에 저장하기 위해 접근합니다.
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  ClearScanTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CoreTests
    dependencies:
      - target: ClearScan
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  ClearScanUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    dependencies:
      - target: ClearScan
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
schemes:
  ClearScan:
    build:
      targets:
        ClearScan: all
        ClearScanTests: [test]
        ClearScanUITests: [test]
    test:
      targets:
        - ClearScanTests
        - ClearScanUITests
